repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check --fix .
        language: system
        pass_filenames: false
        always_run: true

      - id: mypy
        name: mypy
        entry: mypy .
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        entry: python3 -m pytest tests/
        language: system
        pass_filenames: false
        always_run: true
